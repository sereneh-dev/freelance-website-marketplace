<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acinonex Portal - Initialize Account</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
     <!--navbar-->
    <nav class="navbar">
        <div class="container nav-flex">
            <a href="index.html" class="logo-area">
                <img src="acinonex.png" alt="Acinonex Logo" class="logo-image">
                <span class="logo-text">Acinonex</span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="index.html" class="nav-item">Home</a>
                <a href="ServicesPage.html" class="nav-item">Services</a>
                <a href="about.html" class="nav-item active">About</a>
                <a href="contact.html" class="nav-item">Contact</a>
            </div>
            <div class="nav-buttons">
                <a href="log-in.html" class="btn-login">Login</a>
                <a href="sign-up.html" class="btn-signup">Sign Up</a>
            </div>
            <button class="hamburger" id="hamburger-btn">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </button>
        </div>
    </nav>

   

    <main class="signup-wrapper">
        <div class="signup-container">
            <div class="secure-badge">SECURE </div>
            <h2>Create Operator Profile</h2>
            <p class="subtitle">Initialize your credentials to access elite infrastructure tracks.</p>
            
            <form id="signupForm">
                <div class="input-group">
                    <label for="username">Account Full Name</label>
                    <input type="text" id="username" placeholder="e.g. Nino910" autocomplete="off" required>
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="input-group">
                    <label for="email">Corporate Email Address</label>
                    <input type="email" id="email" placeholder="you@company.com" autocomplete="off" required>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="input-group">
                    <label for="password">Security Matrix Password</label>
                    <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="off" required>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Verify Password Security</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat password " autocomplete="off" required>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms">
                    <label for="terms">I verify authentication rules & <a href="#">Platform Conditions</a></label>
                    <span class="error-message" id="termsError"></span>
                </div>

                <button type="submit" class="submit-btn">Initialize Platform Account</button>
            </form>
            
            <p class="login-link">Already registered? <a href="#">Access Uplink Here</a></p>
        </div>
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 ACINONEX Systems Infrastructure Directory. All rights reserved.</p>
    </footer>
        <script src="js.js"></script>


</body>
</html>
